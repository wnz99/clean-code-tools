[tool.ruff]
target-version = "py311"
line-length = 100
extend-exclude = [
  ".venv",
  "__pycache__",
  "build",
  "dist",
]

[tool.ruff.lint]
select = [
  "E",
  "F",
  "I",
  "UP",
  "B",
  "C4",
  "SIM",
  "RET",
  "ARG",
  "ERA",
  "TD",
  "PLR2004",
  "RUF",
]
ignore = [
  "E501",
  "TD001",
]
fixable = [
  "E",
  "F",
  "I",
  "UP",
  "B",
  "C4",
  "SIM",
  "RET",
  "ARG",
  "RUF",
]
unfixable = [
  "ERA",
  "TD",
  "PLR2004",
]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = [
  "ARG001",
  "ARG002",
  "PLR2004",
  "S101",
]

[tool.pylint.main]
py-version = "3.11"
jobs = 0
recursive = true

[tool.pylint."messages control"]
disable = [
  "all",
]
enable = [
  "cyclic-import",
  "duplicate-code",
  "import-error",
  "too-many-ancestors",
  "too-many-arguments",
  "too-many-branches",
  "too-many-instance-attributes",
  "too-many-lines",
  "too-many-locals",
  "too-many-nested-blocks",
  "too-many-public-methods",
  "too-many-return-statements",
  "too-many-statements",
  "too-many-boolean-expressions",
  "too-few-public-methods",
]

[tool.pylint.design]
max-args = 5
max-attributes = 8
max-bool-expr = 5
max-branches = 12
max-locals = 15
max-nested-blocks = 4
max-public-methods = 20
max-returns = 6
max-statements = 50
max-parents = 7
min-public-methods = 1

[tool.pylint.format]
max-line-length = 100
max-module-lines = 1000

[tool.pylint.reports]
score = false
