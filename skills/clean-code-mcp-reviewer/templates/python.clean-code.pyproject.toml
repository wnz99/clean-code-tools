[tool.ruff]
target-version = "py311"
line-length = 100
extend-exclude = [
  ".git",
  ".mypy_cache",
  ".nox",
  ".ruff_cache",
  ".tox",
  ".venv",
  "__pycache__",
  "build",
  "dist",
]

[tool.ruff.lint]
select = [
  "E",
  "F",
  "I",
  "UP",
  "B",
  "C4",
  "SIM",
  "RET",
  "ARG",
  "ERA",
  "TD",
  "PLR2004",
  "RUF",
]
ignore = [
  "E501",
  "TD001",
]
fixable = [
  "E",
  "F",
  "I",
  "UP",
  "B",
  "C4",
  "SIM",
  "RET",
  "ARG",
  "RUF",
]
unfixable = [
  "ERA",
  "TD",
  "PLR2004",
]

[tool.ruff.lint.isort]
known-first-party = []
combine-as-imports = true
split-on-trailing-comma = true

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = [
  "ARG001",
  "ARG002",
  "PLR2004",
  "S101",
]
"**/__init__.py" = [
  "F401",
]

[tool.pylint.main]
py-version = "3.11"
jobs = 0
recursive = true
load-plugins = [
  "clean_code_tools_pylint",
]
ignore-paths = [
  "^\\.venv/.*$",
  "^build/.*$",
  "^dist/.*$",
]

[tool.pylint."messages control"]
disable = [
  "all",
]
enable = [
  "cyclic-import",
  "clean-code-boolean-flag-argument",
  "clean-code-business-policy-literal",
  "clean-code-commented-out-code",
  "clean-code-noisy-comment",
  "clean-code-output-argument-mutation",
  "clean-code-redundant-comment",
  "clean-code-todo-format",
  "clean-code-train-wreck",
  "duplicate-code",
  "import-error",
  "too-many-ancestors",
  "too-many-arguments",
  "too-many-branches",
  "too-many-instance-attributes",
  "too-many-lines",
  "too-many-locals",
  "too-many-nested-blocks",
  "too-many-public-methods",
  "too-many-return-statements",
  "too-many-statements",
  "too-many-boolean-expressions",
  "too-few-public-methods",
]

[tool.pylint.design]
max-args = 5
max-attributes = 7
max-bool-expr = 5
max-branches = 12
max-locals = 15
max-nested-blocks = 4
max-public-methods = 12
max-returns = 6
max-statements = 40
max-parents = 7
min-public-methods = 1

[tool.pylint.format]
max-line-length = 100
max-module-lines = 300

[tool.pylint.imports]
allow-any-import-level = []

[tool.pylint.reports]
score = false
