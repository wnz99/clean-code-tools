name: clean-code-mcp-reviewer

services:
  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.38.1
    mem_limit: "${WEAVIATE_MEMORY_LIMIT:-4g}"
    command:
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - --scheme
      - http
    ports:
      - "${WEAVIATE_HTTP_PORT:-8080}:8080"
      - "${WEAVIATE_GRPC_PORT:-50051}:50051"
    restart: on-failure:0
    environment:
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      CLUSTER_HOSTNAME: node1
      DEFAULT_VECTORIZER_MODULE: none
      DISABLE_TELEMETRY: "${WEAVIATE_DISABLE_TELEMETRY:-true}"
      ENABLE_MODULES: ""
      ASYNC_INDEXING: "${WEAVIATE_ASYNC_INDEXING:-true}"
      GOMEMLIMIT: "${WEAVIATE_GOMEMLIMIT:-3072MiB}"
      GOMAXPROCS: "${WEAVIATE_GOMAXPROCS:-4}"
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      QUERY_DEFAULTS_LIMIT: "${WEAVIATE_QUERY_DEFAULTS_LIMIT:-100}"
    volumes:
      - weaviate_data:/var/lib/weaviate

  clean-code-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      clean-code-mcp-init:
        condition: service_completed_successfully
    ports:
      - "${CLEAN_CODE_MCP_PORT:-8765}:8765"
    environment:
      WEAVIATE_URL: http://weaviate:8080
      CLEAN_CODE_MCP_HOST: 0.0.0.0
      CLEAN_CODE_MCP_PORT: "8765"
    restart: on-failure:0

  clean-code-mcp-init:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - weaviate
    environment:
      WEAVIATE_URL: http://weaviate:8080
      CLEAN_CODE_MCP_RESET_WEAVIATE: "${CLEAN_CODE_MCP_RESET_WEAVIATE:-true}"
    command: ["python", "scripts/docker_init_weaviate.py"]
    restart: "no"

volumes:
  weaviate_data:
