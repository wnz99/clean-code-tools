name: Publish Main Packages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-main
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Check for a new release
        id: release
        run: |
          VERSION="$(bun -p "require('./package.json').version")"
          TAG="v$VERSION"
          git fetch --tags
          git rev-parse "$TAG^{commit}" >/dev/null
          git merge-base --is-ancestor "$TAG" HEAD
          if git merge-base --is-ancestor "$TAG" "${{ github.event.before }}"; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping $TAG because it was already released before this push."
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi
      - run: bun install --frozen-lockfile
        if: steps.release.outputs.publish == 'true'
      - run: bun run check
        if: steps.release.outputs.publish == 'true'
      - name: Publish npm package
        if: steps.release.outputs.publish == 'true'
        run: npm publish --tag latest
      - name: Build Python package
        if: steps.release.outputs.publish == 'true'
        run: uv build
      - name: Publish Python package
        if: steps.release.outputs.publish == 'true'
        run: uv publish --trusted-publishing always
